auth:
  existingSecret: platform-redis
commonConfiguration: '# Enable AOF https://redis.io/topics/persistence#append-only-file
  appendonly yes
  # Disable RDB persistence, AOF persistence already enabled.
  save ""
  # Enable keyspace events
  notify-keyspace-events Kgh'
master:
  persistence:
    enabled: false
replica:
  replicaCount: 0
tls:
  certCAFilename: ca.crt
  certFilename: tls.crt
  certKeyFilename: tls.key
  enabled: true
  existingSecret: platform-redis-server-tls
  authClients: true # clients need to present certificates.  default, but explicitly set for clarity
