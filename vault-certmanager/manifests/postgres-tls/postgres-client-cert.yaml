apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: platform-postgres-client-tls
spec:
  secretName: platform-postgres-client-tls 
  duration: 2160h # 90d
  renewBefore: 360h # 15d
  # This cn/username is verified against the supplied user to the postgres connection
  # for the deployment set in the HOWSO_PLATFORM_POSTGRES_USER variable
  commonName: postgres 
  subject:
    organizations:
    - Howso Platform
  isCA: false
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 4096
  usages:
    - client auth
  dnsNames:
  - platform-sms 
  - platform-sms.default.svc.cluster.local
  - platform-ums 
  - platform-ums.default.svc.cluster.local
  issuerRef:
    name: vault-issuer-internal-k8s
    kind: Issuer
